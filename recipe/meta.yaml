{% set version = "2.8.3" %}

package:
  name: flash-attn-split
  # Strip ".postX" from version number because these just indicate wheel rebuilds and
  # are not relevant to conda builds
  version: {{ version.split('.')[:3] | join('.') }}

source:
  # Use PYPI sdist instead of GitHub because they include a specific vendored CUTLASS
  - url: https://pypi.org/packages/source/f/flash-attn/flash_attn-{{ version }}.tar.gz
    sha256: 1e71dd64a9e0280e0447b8a0c2541bad4bf6ac65bdeaa2f90e51a9e57de0370d
  # Overwrite with a simpler build script that doesn't try to vendor pre-compiled binaries
  - path: pyproject.toml
  - path: setup.py

build:
  number: 0
  script: {{ PYTHON }} -m pip install . -vvv --no-deps --no-build-isolation
  script_env:
    # Limit MAX_JOBS in order to prevent runners from crashing
    - MAX_JOBS=4
    - TORCH_CUDA_ARCH_LIST=8.0;8.6;8.9;9.0;10.0+PTX
  skip: true  # [cuda_compiler_version == "None" or (not linux)]

requirements:
  build:
    - {{ compiler('c') }}
    - {{ compiler('cxx') }}
    - {{ compiler('cuda') }}
    - {{ stdlib('c') }}
    - ninja
    - pytorch           # [build_platform != target_platform]
    - pytorch * cuda*   # [build_platform != target_platform]
  host:
    - cuda-version {{ cuda_compiler_version }}
    - cuda-cudart-dev
    - libcublas-dev
    - libcurand-dev
    - libcusolver-dev
    - libcusparse-dev
    - pip
    - python
    - pytorch
    - pytorch * cuda*
    - setuptools

outputs:
  - name: flash-attn
    requirements:
      build:
        - {{ compiler('c') }}
        - {{ compiler('cxx') }}
        - {{ compiler('cuda') }}
        - {{ stdlib('c') }}
      host:
        - cuda-version {{ cuda_compiler_version }}
        - cuda-cudart-dev
        - python
        - pytorch
        - pytorch * cuda*
      run:
        - einops
        - python
        - pytorch * cuda*

    files:
      include:
        - 'lib/python*/site-packages/flash_attn/**'
        - 'lib/python*/site-packages/flash_attn-{{ version }}.dist-info/**'
        - 'lib/python*/site-packages/flash_attn_2_cuda.cpython-*.so'

    test:
      imports:
        - flash_attn
      commands:
        - pip check
      requires:
        - pip

  - name: flash-attn-fused-dense
    requirements:
      build:
        - {{ compiler('cxx') }} # needed for DSO checker
        - {{ stdlib('c') }}     # needed for DSO checker
        - {{ compiler('cuda') }}
      host:
        - cuda-version {{ cuda_compiler_version }}
        - cuda-cudart-dev
        - libcublas-dev
        - python
        - pytorch
        - pytorch * cuda*
      run:
        - python
        - {{ pin_subpackage('flash-attn', exact=True) }}

    files:
      include:
        - 'lib/python*/site-packages/fused_dense_lib.cpython-*.so'

    test:
      imports:
        - flash_attn.ops.fused_dense
      commands:
        - pip check
      requires:
        - pip

  - name: flash-attn-layer-norm
    requirements:
      build:
        - {{ compiler('cxx') }} # needed for DSO checker
        - {{ stdlib('c') }}     # needed for DSO checker
        - {{ compiler('cuda') }}
      host:
        - cuda-version {{ cuda_compiler_version }}
        - cuda-cudart-dev
        - python
        - pytorch
        - pytorch * cuda*
      run:
        - python
        - {{ pin_subpackage('flash-attn', exact=True) }}

    files:
      include:
        - 'lib/python*/site-packages/dropout_layer_norm.cpython-*.so'

    test:
      imports:
        - flash_attn.ops.layer_norm
      commands:
        - pip check
      requires:
        - pip

about:
  home: https://github.com/Dao-AILab/flash-attention
  summary: 'Flash Attention: Fast and Memory-Efficient Exact Attention'
  description: |
    FlashAttention is a fast and memory-efficient implementation of the exact attention
    mechanism for Transformer models. It supports Ampere, Ada Lovelace, Hopper, and
    Blackwell NVIDIA GPUs with fp16/bf16 precision.
  license: BSD-3-Clause
  license_family: BSD
  license_file:
    - LICENSE
    - LICENSE_CUTLASS.txt
  dev_url: https://github.com/Dao-AILab/flash-attention
  doc_url: https://github.com/Dao-AILab/flash-attention

extra:
  feedstock-name: flash-attn
  recipe-maintainers:
    - carterbox
    - weiji14
